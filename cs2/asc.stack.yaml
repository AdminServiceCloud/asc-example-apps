# Counter-Strike 2 stack: a dedicated server that owns its full game
# installation (~60 GB) in a private per-instance volume.
#
# A shared "master" installation (one game-files volume reused read-only by
# every server instance) is planned but needs daemon features that are not
# implemented yet: start_command execution (DMN-018) and a copy-up overlay
# for the image's writable paths — the joedwards32/cs2 image manages its
# game directory itself and cannot run from a read-only mount.
# Schema: https://registry.adminservice.cloud/schema/asc.stack.schema.json
name: cs2
version: 1.3.0
title: Counter-Strike 2 server
description: "CS2 dedicated server: the game installation lives in a private volume owned by the instance"
category: game-servers

apps:
  - name: server
    path: ./server
