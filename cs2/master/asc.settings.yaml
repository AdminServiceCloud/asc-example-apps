# The master runs SteamCMD on every start: it downloads/updates the game files
# into the shared volume and exits. ${STEAM_APP_ID} comes from the stack's
# shared env (asc.stack.yaml) and is interpolated by the daemon at launch.
# Schema: https://registry.adminservice.cloud/schema/asc.settings.schema.json
start_command: "steamcmd +force_install_dir /data +login anonymous +app_update ${STEAM_APP_ID} validate +quit"

quota:
  max_cpu: 2
  max_ram: 2G
  max_disk: 100G
