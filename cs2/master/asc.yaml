# The "master" installation: SteamCMD downloads and keeps the CS2 game files
# (VPKs) up to date inside the shared named volume `cs2-master-data`. No game
# server process runs here — this app exists only to own the shared files that
# every cs2-server instance mounts.
# Schema: https://registry.adminservice.cloud/schema/asc.schema.json
name: cs2-master
version: 1.0.0
type: docker
title: CS2 master installation
description: "Shared CS2 installation: SteamCMD keeps the game files (VPKs) in a named volume mounted by every cs2-server instance"
category: game-servers
settings: ./asc.settings.yaml

runtime:
  image: steamcmd/steamcmd:latest

volumes:
  # Named volume holding the full CS2 installation.
  # cs2-server links this exact volume (read-only) instead of its own download.
  - cs2-master-data:/data

requirements:
  ram: 1G
  disk: 80G
