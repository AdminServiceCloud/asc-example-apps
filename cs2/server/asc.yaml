# The game server: the image (joedwards32/cs2) downloads and updates the CS2
# installation itself via SteamCMD on start, and keeps it — together with the
# instance's configs/logs/demos — in one writable volume it owns.
# Schema: https://registry.adminservice.cloud/schema/asc.schema.json
name: cs2-server
version: 1.3.0
type: docker
title: CS2 dedicated server
description: "Counter-Strike 2 dedicated server; the game installation (~60 GB) is downloaded on first start into the instance's private volume"
category: game-servers
settings: ./asc.settings.yaml

runtime:
  image: joedwards32/cs2:latest
  # The CS2 server console: keep stdin open and allocate a TTY (docker run
  # -it) so `asc attach` can send console commands to the server.
  stdin: true
  tty: true

# All environment variables come from asc.settings.yaml (settings with env:).

ports: [27015, 27020]

volumes:
  # Full game installation + this instance's configs, logs and demos.
  # The private form mounts the app's data folder (/asc/apps/<id>/data),
  # so the ~60 GB download survives container recreation and upgrades.
  - /home/steam/cs2-dedicated

requirements:
  ram: 4G
  disk: 80G   # the game installation is ~60 GB plus updates headroom
  cpu: 2

healthcheck:
  command: "pidof cs2"
  interval: 60s
