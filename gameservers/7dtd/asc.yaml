# 7 Days to Die dedicated server: a custom image (Dockerfile in this
# directory) since no maintained prebuilt image exposes every game setting
# (name, password, max players, visibility...) as an environment variable.
# The entrypoint runs SteamCMD anonymously and passes each setting straight
# to the game binary as a -PropertyName=value override on top of its own
# bundled serverconfig.xml, so the game installation, config and saves all
# live in this instance's private volumes.
# Schema: https://registry.adminservice.cloud/schema/asc.schema.json
name: 7dtd
version: 2.0.4
type: docker
title: 7 Days to Die server
description: "7 Days to Die dedicated server; the game installation is downloaded on first start into the instance's private volumes"
category: game-servers
settings: ./asc.settings.yaml

runtime:
  image-build:
    context: .
    dockerfile: Dockerfile
    tag: "asc-local/7dtd:latest"
  # Cosmetic only: keeps `asc attach` from immediately closing the session
  # and gives it a real TTY. The dedicated server binary itself never reads
  # admin commands from stdin on Linux (confirmed against upstream/other
  # Docker images of this game) — Telnet (telnet_port in asc.settings.yaml)
  # is the only console it actually listens on.
  stdin: true
  tty: true

# Environment variables, published ports and volumes are all declared in
# asc.settings.yaml (settings with env:, type: ports, type: volumes) — the
# manifest describes only the runtime itself.

requirements:
  ram: 4G
  disk: 20G   # the game installation plus updates headroom
  cpu: 2

healthcheck:
  command: "pgrep -f 7DaysToDieServer.x86_64"
  interval: 60s
