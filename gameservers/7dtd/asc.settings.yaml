# User-facing settings of one 7 Days to Die server instance. Values are
# exposed to the container as the environment variables read by this app's
# own entrypoint.sh (see ../Dockerfile), which passes each of them straight
# to the game binary as a -PropertyName=value override on top of its bundled
# serverconfig.xml. `type: ports` settings are also published on the host;
# `type: volumes` settings define the app's mounts.
# Schema: https://registry.adminservice.cloud/schema/asc.settings.schema.json
settings:
  - key: server_name
    type: string
    title: "Server name"
    description: "Publicly visible server name (ServerName)"
    default: "7DaysToDieServer"
    limits: { max_length: 64 }
    env: SERVER_NAME

  - key: server_desc
    type: string
    title: "Server description"
    description: "Publicly visible server description (ServerDescription)"
    default: "7DaysToDieServer"
    limits: { max_length: 128 }
    env: SERVER_DESC

  - key: game_version
    type: enum
    title: "Game version"
    description: "SteamCMD branch to install; pick a preset or enter a custom branch id. Left as 'public' (the default branch), no -beta flag is passed to SteamCMD"
    values: [public, latest_experimental]
    default: public
    allow_custom: true
    env: GAME_VERSION

  - key: public_server
    type: enum
    title: "Server visibility"
    description: "0 = not listed, 1 = friends only, 2 = friends of friends, 3 = everyone (ServerVisibility)"
    values: [0, 1, 2, 3]
    default: 2
    env: PUBLIC_SERVER

  - key: max_players
    type: number
    title: "Max players"
    description: "ServerMaxPlayerCount"
    default: 8
    limits: { min: 1, max: 64 }
    env: MAX_PLAYERS

  - key: server_password
    type: secret
    title: "Server password"
    description: "Leave empty for a public server (ServerPassword)"
    default: ""
    env: SERVER_PASSWORD

  - key: game_difficulty
    type: enum
    title: "Game difficulty"
    description: "0 = easiest, 5 = hardest (GameDifficulty)"
    values: [0, 1, 2, 3, 4, 5]
    default: 2
    env: GAME_DIFFICULTY

  - key: disabled_network_protocols
    type: string
    title: "Disabled network protocols"
    description: "Comma-separated, e.g. SteamNetworking to disable it behind NAT with no port forwarding (ServerDisabledNetworkProtocols); leave empty to keep both enabled"
    default: ""
    required: false
    env: SERVER_DISABLED_NETWORK_PROTOCOLS

  - key: auto_update
    type: boolean
    title: "Update on every start"
    description: "Run SteamCMD app_update before launching the server each time it starts; always forced on the very first start regardless of this setting"
    default: true
    env: AUTO_UPDATE

  - key: steam_validate
    type: boolean
    title: "Validate game files on start"
    description: "Forces SteamCMD to validate/redownload corrupted game files; always forced on the very first install regardless of this setting"
    default: false
    env: STEAM_VALIDATE

  - key: telnet_port
    type: number
    title: "Telnet port (internal)"
    description: "In-container admin telnet port; not published on the host, only reachable inside the app's Docker network"
    default: 8081
    limits: { min: 1024, max: 65535 }
    env: TELNET_PORT

  - key: telnet_password
    type: secret
    title: "Telnet password"
    description: "Leave empty to keep telnet unauthenticated (fine as long as telnet_port stays unpublished)"
    default: ""
    env: TELNET_PASSWORD

  - key: web_dashboard_enabled
    type: boolean
    title: "Web dashboard"
    description: "Built-in browser admin panel — player list, live map, chat (WebDashboardEnabled). Unlike telnet_port this one is published: create a login by running 'createwebuser <user> <password> 0' over telnet first, the dashboard has no default account"
    default: true
    env: WEB_DASHBOARD_ENABLED

  - key: web_dashboard_port
    type: ports
    title: "Web dashboard port"
    default: [8080]
    limits: { min: 1024, max: 65535 }
    env: WEB_DASHBOARD_PORT
    protocol: tcp

  - key: enable_map_rendering
    type: boolean
    title: "Render map tiles"
    description: "Needed for the web dashboard's live map view (EnableMapRendering); a small CPU/disk cost paid while exploring, not at idle"
    default: true
    env: ENABLE_MAP_RENDERING

  # The game/query port is published on the host AND exposed via env, so the
  # server listens on the same port Docker forwards.
  - key: game_port
    type: ports
    title: "Game port (TCP+UDP)"
    default: [26900]
    limits: { min: 1024, max: 65535 }
    env: GAME_PORT
    protocol: both

  # Two more ports the game binary always uses at base+1/base+2, with no env
  # var of their own — republish them alongside game_port if you change it.
  - key: extra_game_ports
    type: ports
    title: "Additional game ports (UDP)"
    description: "Fixed at game_port+1 and game_port+2 by the server; keep these two numbers in sync with game_port"
    default: [26901, 26902]
    limits: { min: 1024, max: 65535 }
    protocol: udp

  # Game server files (downloaded by SteamCMD on first start), kept in this
  # instance's private volume so the ~12 GB download survives recreation.
  - key: server_files
    type: volumes
    title: "Game server files volume"
    default: [/home/steam/7DTDServer]

  # Saves, player data and logs, kept separate from the (large, disposable
  # and re-downloadable) server files above.
  - key: server_data
    type: volumes
    title: "Saves and logs volume"
    default: [/home/steam/.local/share/7DaysToDie]

quota:
  max_cpu: 2
  max_ram: 4G
  max_disk: 25G
