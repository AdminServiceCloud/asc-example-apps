name: 🐛 Example doesn't work
description: Report an example app that fails to install, build, or run
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Report an example that fails to install, build, or run.

  - type: input
    id: example
    attributes:
      label: Example
      description: Which example is affected?
      placeholder: e.g. helloworld, postgresql.yaml
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What went wrong
      description: A clear and concise description of the problem
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. asc source add file:///path/to/asc-example-apps
        2. asc install <name>
        3. See the error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / errors
      description: Install output or app logs, if any
      render: shell

  - type: input
    id: os
    attributes:
      label: Operating system
      description: On which OS did the problem occur?
      placeholder: e.g. Ubuntu 24.04, Debian 12

  - type: input
    id: version
    attributes:
      label: asc version
      description: Output of `asc --version`
      placeholder: e.g. v0.0.1 or commit hash

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information that might be useful
