# Redis, the database half of the redis-commander stack.
# Schema: https://registry.adminservice.cloud/schema/asc.schema.json
name: redis
version: 7.2.0
type: docker
title: Redis
description: "In-memory data store, cache and message broker, pinned to an upstream release"
category: databases
settings: ./asc.settings.yaml

runtime:
  image: redis:7.2

requirements:
  ram: 256M
  disk: 1G
  cpu: 0.5

healthcheck:
  command: "redis-cli ping"
  interval: 30s
