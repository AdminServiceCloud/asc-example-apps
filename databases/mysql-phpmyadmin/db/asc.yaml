# MySQL, the database half of the mysql-phpmyadmin stack.
# Schema: https://registry.adminservice.cloud/schema/asc.schema.json
name: mysql
version: 8.4.0
type: docker
title: MySQL
description: "Widely used open source relational database, pinned to an upstream LTS release"
category: databases
settings: ./asc.settings.yaml

runtime:
  image: mysql:8.4

requirements:
  ram: 512M
  disk: 5G
  cpu: 1

healthcheck:
  command: "mysqladmin ping"
  interval: 30s
