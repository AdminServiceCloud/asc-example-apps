# ClickHouse as a long-running database (type: docker), pinned to the
# official clickhouse-server image at a specific upstream release.
# Schema: https://registry.adminservice.cloud/schema/asc.schema.json
name: clickhouse
version: 24.6.1
type: docker
title: ClickHouse
description: "Yandex-originated open source columnar database for real-time analytics"
category: databases
settings: ./asc.settings.yaml

runtime:
  image: clickhouse/clickhouse-server:24.6.1

requirements:
  ram: 1G
  disk: 10G
  cpu: 1

healthcheck:
  http: /ping
  interval: 30s
